name: Radar Midea PortaSplit

# Radar de réassort gratuit, dans le cloud (aucun PC requis).
# Déclenché de façon FIABLE par un pinger externe (cron-job.org) toutes les ~10 min
# via l'API workflow_dispatch. Le cron GitHub ci-dessous n'est qu'un filet de
# secours (best-effort). Chaque run = 1 cycle rapide (~1 min).
on:
  workflow_dispatch: {} # déclenché par le pinger (et manuellement)
  schedule:
    - cron: '4,14,24,34,44,54 * * * *' # filet de secours (GitHub best-effort)

permissions:
  contents: write # pour persister .monitor-state.json (anti-spam)

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --omit=optional
      - name: Scan + alerte (1 cycle)
        run: npm run monitor -- --once
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          ALERT_MACOS: '0'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      - name: Persiste l'état (anti-spam, push robuste)
        run: |
          if [[ -n "$(git status --porcelain .monitor-state.json)" ]]; then
            git config user.name "radar-bot"
            git config user.email "radar-bot@users.noreply.github.com"
            git add .monitor-state.json
            git commit -m "radar: update state [skip ci]"
            for i in 1 2 3; do
              git push && break
              git pull --rebase --autostash origin main || true
            done
          fi
